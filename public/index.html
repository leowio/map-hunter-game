<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />

  <link rel="manifest" href="manifest.json" />

  <title>Map Hunter</title>

  <link rel="stylesheet" type="text/css" href="style.css">

  <script src="lib/p5.js"></script>
  <script src="lib/mappa.js" type="text/javascript"></script>
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>
    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      eruda.init();
    }
  </script>
  <script src="socket.io/socket.io.js"></script>
  <script src="lib/p5.sound.js"></script>
</head>

<body>
  <button id="requestGPSButton" onclick="requestGPS()" style="position:fixed;top:20px;left:20px;z-index:1000;padding:10px 16px;font-size:14px;cursor:pointer;">
    Request GPS
  </button>

  <div id="player-count" style="position:fixed;top:20px;right:20px;z-index:1000;background:rgba(0,0,0,0.6);color:white;padding:8px 12px;border-radius:8px;font-family:sans-serif;font-size:14px;">
    Players: 0
  </div>

  <button id="readyButton" onclick="toggleReady()" style="position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:1000;padding:14px 32px;font-size:18px;cursor:pointer;border:none;border-radius:12px;background:#4CAF50;color:white;font-weight:bold;">
    Ready
  </button>

  <div class="main-wrapper">
    <div id="p5-canvas-container"></div>
  </div>

  <script src="requestGPS.js"></script>
  <script src="sketch.js"></script>
</body>

</html>
